name: Demo Nightly Reset

on:
  schedule:
    # 3 AM ET = 7 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: demo
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - name: Run demo seed reset
        env:
          DEMO_SUPABASE_URL: ${{ secrets.DEMO_SUPABASE_URL }}
          DEMO_SUPABASE_SERVICE_KEY: ${{ secrets.DEMO_SUPABASE_SERVICE_KEY }}
        run: pnpm demo:reset

  smoke:
    needs: reset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: demo
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - name: Run smoke tests against demo
        env:
          DEMO_RENUBU_URL: ${{ vars.DEMO_RENUBU_URL }}
          DEMO_GOODHANG_URL: ${{ vars.DEMO_GOODHANG_URL }}
          DEMO_FANCY_ROBOT_URL: ${{ vars.DEMO_FANCY_ROBOT_URL }}
          DEMO_SUPABASE_URL: ${{ secrets.DEMO_SUPABASE_URL }}
          DEMO_SUPABASE_SERVICE_KEY: ${{ secrets.DEMO_SUPABASE_SERVICE_KEY }}
        run: pnpm test:smoke

  notify:
    needs: [reset, smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report failure
        run: |
          echo "## Demo Nightly Reset Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reset: ${{ needs.reset.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Smoke: ${{ needs.smoke.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
